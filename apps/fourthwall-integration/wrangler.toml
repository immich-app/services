name = "fourthwall-integration-immich-app"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Database binding
[[d1_databases]]
binding = "DB"
database_name = "fourthwall-integration"
database_id = "" # Will be filled by Terraform

# Queue bindings - Producer bindings
[[queues.producers]]
queue = "webhook-processor"
binding = "WEBHOOK_QUEUE"

[[queues.producers]]
queue = "fulfillment-processor"
binding = "FULFILLMENT_QUEUE"

# Queue bindings - Consumer binding (this worker consumes from webhook-processor)
[[queues.consumers]]
queue = "webhook-processor"
max_batch_size = 10
max_batch_timeout = 30


# Cron triggers
[triggers]
crons = ["0 */15 * * * *"] # Every 15 minutes for Kunaki status polling
