name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TG_NON_INTERACTIVE: 'true'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
      - name: Run pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-output
          path: 'dist'
          retention-days: 7

  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      ENVIRONMENT: dev
      TF_VAR_stage: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || '' }}
      TF_VAR_dist_dir: ${{ github.workspace }}/dist
      TF_VAR_migrations_dir: ${{ github.workspace }}/apps/version/migrations
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_TF_DEV_ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Get build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: 'build-output'
          path: '${{ github.workspace }}/dist'

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@9a0c9dd934086b7ab1d90115d455bda1c53c2bdb # v2.0.2

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@697a75e2c3186d3c037c2c159855cf2d566542ba # use-mise-action-0.0.1

      - name: Deploy All
        working-directory: ${{ github.workspace }}/deployment
        run: mise run tf:apply

      - name: Collect preview URLs
        if: ${{ github.event_name == 'pull_request' }}
        id: preview-urls
        working-directory: ${{ github.workspace }}/deployment
        run: |
          BODY="<!-- preview-urls -->"$'\n'
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BODY+="### Preview Deployments ([${SHORT_SHA}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${{ github.event.pull_request.head.sha }}))"$'\n\n'
          BODY+="| Worker | Preview URL |"$'\n'
          BODY+="|--------|-------------|"$'\n'
          for dir in modules/cloudflare/workers/*/; do
            worker_name=$(basename "$dir")
            cd "${{ github.workspace }}/deployment/${dir}"
            url=$(mise run tg output -raw preview_url 2>/dev/null) || true
            cd "${{ github.workspace }}/deployment"
            if [ -n "$url" ]; then
              BODY+="| ${worker_name} | [${url}](${url}) |"$'\n'
            fi
          done
          {
            echo "body<<COMMENT_EOF"
            echo "$BODY"
            echo "COMMENT_EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment preview URLs
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions-cool/maintain-one-comment@4b2dbf086015f892dcb5e8c1106f5fccd6c1476b # v3.2.0
        with:
          number: ${{ github.event.number }}
          body: ${{ steps.preview-urls.outputs.body }}
          emojis: 'rocket'
          body-include: '<!-- preview-urls -->'

  deploy-prod:
    name: Deploy (prod)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build]
    env:
      ENVIRONMENT: prod
      TF_VAR_stage: ''
      TF_VAR_dist_dir: ${{ github.workspace }}/dist
      TF_VAR_migrations_dir: ${{ github.workspace }}/apps/version/migrations
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_TF_PROD_ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Get build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: 'build-output'
          path: '${{ github.workspace }}/dist'

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@9a0c9dd934086b7ab1d90115d455bda1c53c2bdb # v2.0.2

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@697a75e2c3186d3c037c2c159855cf2d566542ba # use-mise-action-0.0.1

      - name: Deploy All
        working-directory: ${{ github.workspace }}/deployment
        run: mise run tf:apply
