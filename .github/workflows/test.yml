name: Test
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Run pnpm install
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint
        if: ${{ !cancelled() }}

      - name: Run formatter
        run: pnpm run format
        if: ${{ !cancelled() }}

      - name: Run tsc
        run: pnpm run check
        if: ${{ !cancelled() }}

      - name: Run unit tests
        run: pnpm run test
        if: ${{ !cancelled() }}

  terraform-lock-files:
    name: Terraform lock files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check every module has a committed lock file
        run: ./deployment/scripts/check-lock-files.sh

  integration-test-cloudflare-metrics:
    name: Integration Test (cloudflare-metrics)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # dorny/paths-filter reads changed files via the API on pull_request
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            cloudflare-metrics:
              - 'apps/cloudflare-metrics/**'
              - '.github/workflows/test.yml'

      - name: Setup pnpm
        if: steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        if: steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Run pnpm install
        if: steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request'
        run: pnpm install --frozen-lockfile

      - name: Install 1Password CLI
        if: steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request'
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71 # v4.0.0

      - name: Check integration credentials are available
        id: creds
        if: steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request'
        continue-on-error: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_TF_DEV_ENV }}
        run: |
          if op run --env-file=apps/cloudflare-metrics/.integration.env -- sh -c 'test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID"' 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping integration test — credentials not configured in 1Password"
          fi

      - name: Run integration tests
        if: >-
          (steps.changes.outputs.cloudflare-metrics == 'true' || github.event_name != 'pull_request')
          && steps.creds.outputs.available == 'true'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_TF_DEV_ENV }}
        run: |
          op run \
            --env-file=apps/cloudflare-metrics/.integration.env \
            -- pnpm --filter @immich-services/cloudflare-metrics run test:integration
