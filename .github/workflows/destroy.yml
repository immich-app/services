name: Destroy PR environment
on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number whose pr-<N> stage to destroy in dev + prod'
        required: true
        type: string

env:
  TG_NON_INTERACTIVE: 'true'

jobs:
  destroy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ['dev', 'prod']
    env:
      ENVIRONMENT: ${{ matrix.environment }}
      TF_VAR_stage: pr-${{ github.event.inputs.pr_number || github.event.number }}
      TF_VAR_dist_dir: ${{ github.workspace }}/dist
      TF_VAR_migrations_dir: ${{ github.workspace }}/apps/version/migrations
      OP_SERVICE_ACCOUNT_TOKEN: ${{ matrix.environment == 'prod' && secrets.OP_TF_PROD_ENV || secrets.OP_TF_DEV_ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create dummy dist for terraform evaluation
        run: |
          for worker in apps/*/; do
            name=$(basename "$worker")
            mkdir -p "dist/${name}"
            echo "" > "dist/${name}/index.js"
          done

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@8d006a0d0a4fd505af7f7ce589e7f768385ff5e4 # v3.0.0

      - id: token
        uses: immich-app/devtools/actions/create-workflow-token@9db058b2e6eec20e07760b0e17a0505c78ec3191 # create-workflow-token-action-v2.0.1
        with:
          client-id: ${{ secrets.PUSH_O_MATIC_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUSH_O_MATIC_APP_KEY }}

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@7b8610a904d57da241e4ddba17fa62b62b15aed4 # use-mise-action-v2.0.2
        with:
          github_token: ${{ steps.token.outputs.token }}

      - name: Destroy All
        working-directory: ${{ github.workspace }}/deployment
        run: mise run tf:destroy
