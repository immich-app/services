name: Destroy PR environment
on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number whose pr-<N> stage to destroy in dev + prod'
        required: true
        type: string

env:
  TG_NON_INTERACTIVE: 'true'

jobs:
  destroy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ['dev', 'prod']
    env:
      ENVIRONMENT: ${{ matrix.environment }}
      TF_VAR_stage: pr-${{ github.event.inputs.pr_number || github.event.number }}
      TF_VAR_dist_dir: ${{ github.workspace }}/dist
      TF_VAR_migrations_dir: ${{ github.workspace }}/apps/version/migrations
      OP_SERVICE_ACCOUNT_TOKEN: ${{ matrix.environment == 'prod' && secrets.OP_TF_PROD_ENV || secrets.OP_TF_DEV_ENV }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create dummy dist for terraform evaluation
        run: |
          for worker in apps/*/; do
            name=$(basename "$worker")
            mkdir -p "dist/${name}"
            echo "" > "dist/${name}/index.js"
          done

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@a5215d3a7f75c1629216c465ea9ab3ab399c4b71 # v4.0.0

      - id: token
        uses: immich-app/devtools/actions/create-workflow-token@1af396ae134e4bc3b63d947e672bc68bf4ff9dc5 # create-workflow-token-action-v3.0.0
        with:
          client-id: ${{ secrets.PUSH_O_MATIC_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUSH_O_MATIC_APP_KEY }}
          permission-contents: read

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@3bca63ca3c15020293b36b51737a3ee2c773340b # use-mise-action-v3.1.0
        with:
          github_token: ${{ steps.token.outputs.token }}

      - name: Destroy All
        working-directory: ${{ github.workspace }}/deployment
        run: mise run tf:destroy
