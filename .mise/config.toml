[tools]
opentofu = "1.12.4"
terragrunt = "1.1.1"

[env]
TF_VAR_dist_dir="{{config_root}}/dist"
# op vault references in deployment/.env only resolve in the immich account;
# without this, op defaults to whichever signed-in account was used last
OP_ACCOUNT="immich.1password.com"

[tasks.tg]
run = "op run '--env-file={{config_root}}/deployment/.env' -- terragrunt"
description = "Wrapper for terragrunt"
dir = "{{cwd}}"

[tasks."tg:fmt"]
run = "mise run tg hclfmt"
description = "Format terragrunt files"

[tasks.tf]
run = "mise run tg run --all"
description = "Wrapper for terragrunt run-all"
dir = "{{cwd}}"

[tasks."tf:fmt"]
run = "tofu fmt -recursive tf/"
description = "Format terraform files"

[tasks."tf:init"]
run = "mise run tf init -- -reconfigure"
dir = "{{cwd}}"

[tasks."tf:plan"]
run = "mise run tf plan"
dir = "{{cwd}}"

[tasks."tf:apply"]
run = "mise run tf apply"
dir = "{{cwd}}"

[tasks."tf:destroy"]
run = "mise run tf destroy"
dir = "{{cwd}}"

[tasks."tf:check-locks"]
run = "{{config_root}}/deployment/scripts/check-lock-files.sh"
description = "Ensure every Terraform module has a committed .terraform.lock.hcl"

[settings]
experimental = true
idiomatic_version_file_enable_tools = []
